<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Poster — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <header class="border-b border-zinc-800 bg-zinc-900/60 sticky top-0 backdrop-blur">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="font-bold text-lg">⚡ Clip Poster <span class="text-zinc-500 font-normal text-sm">dashboard</span></a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="/" class="text-zinc-300 hover:text-white">Setup</a>
        <a href="/hermes" class="text-emerald-400 hover:text-emerald-300">📈 Hermes</a>
      </nav>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-6 py-8 space-y-10">
    {% block body %}{% endblock %}
  </main>
</body>
</html>
